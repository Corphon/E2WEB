<!DOCTYPE html>
<html lang="en">

<head>
    <title>E2Web Form Mapper</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            width: 520px;
            margin: 0;
            padding: 14px;
            background: #f7f8fb;
            color: #1f2937;
        }

        .title {
            margin: 0 0 10px;
            font-size: 18px;
            font-weight: 700;
        }

        .row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }

        .hint {
            font-size: 12px;
            color: #6b7280;
            margin: 4px 0 0;
        }

        .status {
            margin-top: 8px;
            font-size: 12px;
            min-height: 18px;
        }

        .status.ok {
            color: #166534;
        }

        .status.error {
            color: #991b1b;
        }

        button {
            padding: 9px 10px;
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            font-size: 13px;
            cursor: pointer;
            flex: 1;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button.secondary {
            background-color: #0f766e;
        }

        button.secondary:hover {
            background-color: #0d9488;
        }

        button.ghost {
            background-color: #6b7280;
        }

        button.ghost:hover {
            background-color: #4b5563;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        select,
        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #d1d5db;
            border-radius: 5px;
            padding: 8px;
            font-size: 13px;
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th,
        td {
            border-bottom: 1px solid #e5e7eb;
            padding: 7px 6px;
            font-size: 12px;
            text-align: left;
            vertical-align: top;
            word-break: break-word;
        }

        th {
            color: #374151;
            font-weight: 600;
        }

        .col-index {
            width: 44px;
        }

        .col-field {
            width: 150px;
        }

        .col-sheet {
            width: 110px;
        }

        .col-cell {
            width: 86px;
        }

        .col-action {
            width: 72px;
        }

        .mapping-tag {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 6px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            background: #fef3c7;
            color: #92400e;
        }

        .mapping-row-ignored td {
            opacity: 0.65;
        }

        button.row-remove-button {
            flex: none;
            width: 100%;
            padding: 6px 8px;
            font-size: 12px;
            background-color: #9ca3af;
        }

        button.row-remove-button:hover {
            background-color: #6b7280;
        }

        button.row-remove-button.is-ignored {
            background-color: #d97706;
        }

        button.row-remove-button.is-ignored:hover {
            background-color: #b45309;
        }

        .inline-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
    </style>
</head>

<body>
    <h1 class="title">E2Web Form Mapper</h1>

    <div class="row">
        <button id="identifyButton">Identify Form</button>
        <button id="uploadDataButton">Upload Excel</button>
        <input id="excelInput" class="hidden" type="file" accept=".xlsx,.xls,.csv" />
    </div>

    <div class="row">
        <button id="saveConfigButton">Save Config</button>
        <button id="deleteConfigButton" class="ghost">Delete Config</button>
    </div>

    <div class="card">
        <div class="inline-fields">
            <div>
                <label for="configPresetSelect">Config preset</label>
                <select id="configPresetSelect"></select>
            </div>
            <div>
                <label for="configNameInput">Config name</label>
                <input id="configNameInput" type="text" placeholder="Enter config name" />
            </div>
        </div>
        <p class="hint">Built-in configs come from the catalog. Saved configs are stored locally.</p>
    </div>

    <div id="mappingCard" class="card hidden">
        <table>
            <thead>
                <tr>
                    <th class="col-index">#</th>
                    <th class="col-field">Field</th>
                    <th class="col-sheet">Sheet</th>
                    <th class="col-cell">Cell</th>
                    <th class="col-action">Ignore</th>
                </tr>
            </thead>
            <tbody id="mappingBody"></tbody>
        </table>
    </div>

    <div id="status" class="status"></div>

    <script src="xlsx.js"></script>
    <script src="popup.js"></script>
</body>

</html>
